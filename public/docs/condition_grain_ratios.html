const panelEl = document.getElementById('panel');
let active = 0;

function render(i) {
  active = i;
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', j===i));
  const c = CONDITIONS[i];
  const barsHTML = c.grains.map(g => `
    <div class="bar-row">
      <div class="bar-label">${g.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${g.pct}%;background:${g.color}"></div></div>
      <div class="bar-pct">${g.pct}%</div>
    </div>
  `).join('');
  const avoidHTML = c.avoid.map(a => `<span class="tag tag-avoid">✗ ${a}</span>`).join('');
  panelEl.innerHTML = `
    <div class="title">${c.icon} ${c.name} Multigrain Atta</div>
    <div class="subtitle">${c.tagline}</div>
    <div class="meta">
      <div class="meta-item">Glycemic index: <span>${c.gi}</span></div>
      <div class="meta-item">Protein: <span>${c.protein}</span></div>
    </div>

    ${barsHTML}
    <hr class="divider">
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;font-weight:500;">Avoid in this blend:</div>
    <div class="tags">${avoidHTML}</div>
    <div style="margin-top:14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:12px;color:var(--color-text-secondary);border-left:2px solid var(--color-border-info);">

  `;
}

  btn.onclick = () => render(i);
